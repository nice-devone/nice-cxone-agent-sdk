name: Publish ui-controls

# Controls when the workflow will run
on:
  # push:
  #  branches:
  #    - main
  #  paths-ignore:
  #   - '.github/**'
   # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publish:
  # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Enable OIDC for npm trusted publishers (no token auth needed)
    permissions:
      id-token: write
      contents: read
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          scope: '@nice-devone'
          registry-url: https://registry.npmjs.org
      # Publish via OIDC: unset token, verbose logging, provenance attestations
      - name: Publish to npm
        run: |
          unset NODE_AUTH_TOKEN && npm publish --verbose --provenance --access public
        working-directory: dist/ui-controls
