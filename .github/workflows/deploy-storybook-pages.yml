name: (DEPRECATED) Deploy SDK-UI-Components Storybook to GitHub Pages

# ──────────────────────────────────────────────────────────────────
# This workflow has been superseded by `deploy-faq-pages.yml`, which
# publishes BOTH the FAQ site (root) and the storybooks (/storybooks/)
# in a single unified GitHub Pages deployment.
#
# Only one Pages deployment can be active per repo, so this workflow
# is now manual-only (workflow_dispatch) and will not run on pushes.
# Delete this file once you're confident the new workflow is working.
# ──────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybooks

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
