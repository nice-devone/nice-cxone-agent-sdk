name: Deploy GitHub Pages (FAQ + Storybooks)

# Single, unified GitHub Pages deployment for this repository.
#
# GitHub Pages allows only ONE active deployment per repo, so this is the
# only workflow that touches Pages. Each run REPLACES the live site with
# the artifact built below — running two separate Pages deployments would
# wipe whichever artifact was uploaded second-to-last.
#
# Layout of the deployed site:
#   /       -> Storybook bundle (storybooks/)
#   /faq/   -> FAQ static site (FAQ/)

on:
  push:
    branches:
      - main
    paths:
      - 'FAQ/**'
      - 'storybooks/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping Pages deployments from racing.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Assemble static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble _site folder (Storybook at root, FAQ under /faq)
        run: |
          set -euo pipefail
          mkdir -p _site

          if [ -d "storybooks" ]; then
            echo "Copying storybooks/ -> _site/"
            cp -R storybooks/. _site/
          else
            echo "::warning::storybooks folder not found - skipping storybooks copy."
          fi

          if [ -d "FAQ" ]; then
            echo "Copying FAQ/ -> _site/faq/"
            mkdir -p _site/faq
            cp -R FAQ/. _site/faq/
          else
            echo "::warning::FAQ folder not found - skipping FAQ copy."
          fi

          # Tell GitHub Pages not to run Jekyll processing.
          touch _site/.nojekyll

          echo "Final _site tree (top level):"
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
