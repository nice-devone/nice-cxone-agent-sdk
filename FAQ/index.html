<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frequently asked questions about the NICE CMA SDK — ACD, Agent, Auth, Voice, Digital, Common, and the cxa-sdk-consumer reference app." />
    <meta name="theme-color" content="#0a2540" />
    <title>NICE CMA SDK — Help & FAQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Top navigation bar -->
    <header class="site-header" role="banner">
        <div class="container nav-container">
            <a href="./" class="brand" aria-label="NICE CMA SDK">
                <span class="brand-text">
                    <strong>NICE CMA</strong>
                    <small>SDK</small>
                </span>
            </a>
            <nav class="primary-nav" aria-label="Primary">
                <a href="https://www.npmjs.com/org/nice-devone" target="_blank" rel="noopener">NPM packages</a>
                <a href="https://help.nicecxone.com/content/agent/agentapplicationadministration/cxoneagent/cxasdk.htm" target="_blank" rel="noopener" class="nav-cta">Official docs</a>
            </nav>
        </div>
    </header>

    <!-- Hero with search -->
    <section class="hero" aria-labelledby="hero-title">
        <div class="container">
            <h1 id="hero-title">How can we help?</h1>
            <p class="hero-sub">Search the SDK FAQ for quick answers — ACD, Auth, Voice, Digital, Agent, Common, and the cxa-sdk-consumer reference app.</p>
            <form class="search" role="search" onsubmit="return false;">
                <label for="search-input" class="visually-hidden">Search FAQs</label>
                <span class="search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input
                    id="search-input"
                    type="search"
                    placeholder="Search FAQs"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button type="button" id="clear-search" class="search-clear" aria-label="Clear search" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </form>
            <p class="search-status" id="search-status" hidden></p>
        </div>
    </section>

    <!-- All FAQ accordion sections -->
    <main id="faq-sections" class="section">
        <div class="container">
            <div id="faq-content"><!-- Injected by JS --></div>
            <div id="no-results" class="no-results" hidden>
                <p>No matches found. Try a different keyword.</p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <strong>NICE CMA SDK</strong>
                <span class="muted">Reference & FAQ — v<span id="footer-version">25.4</span></span>
            </div>
            <nav class="footer-links" aria-label="Footer">
                <a href="https://www.npmjs.com/org/nice-devone" target="_blank" rel="noopener">NPM</a>
                <a href="https://help.nicecxone.com/content/agent/agentapplicationadministration/cxoneagent/cxasdk.htm" target="_blank" rel="noopener">Official docs</a>
            </nav>
            <small class="muted">© <span id="footer-year"></span> NICE Ltd.</small>
        </div>
    </footer>

    <!-- Data is embedded as a JS global so the page works on file:// as well -->
    <script src="data/faqs-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
